program: src.fine_tune.fine_tune_yolo
project: "YOLO_FineTune_Massive_Stages"
method: grid
metric:
  name: val_coco_ap
  goal: maximize
parameters:
  epochs_head:
    values: [5]
  lr_head:
    values: [0.000054885135064454]
  epochs_neck:
    values: [5]
  lr_neck:
    values: [0.00001684189913387262]
  epochs_backbone:
    values: [0]
  lr_backbone:
    values: [0.0000005]
command:
  - ${env}
  - ${interpreter}
  - "-m"
  - ${program}
  - "--config"
  - "src/fine_tune/config_yolo_base.yaml"
  - ${args}
