program: src.fine_tune.fine_tune_yolo
project: "YOLO_FineTune_Massive_Stages"
method: bayes
metric:
  name: val_coco_ap
  goal: maximize
parameters:
  epochs_head:
    values: [5, 10]
  lr_head:
    distribution: log_uniform_values
    min: 0.00005
    max: 0.005
  epochs_neck:
    values: [5, 10, 15]
  lr_neck:
    distribution: log_uniform_values
    min: 0.0000005
    max: 0.00005
  epochs_backbone:
    values: [0, 5, 10]
  lr_backbone:
    distribution: log_uniform_values
    min: 0.0000005
    max: 0.00005
command:
  - ${env}
  - ${interpreter}
  - "-m"
  - ${program}
  - "--config"
  - "src/fine_tune/config_yolo_base.yaml"
  - ${args}
