program: src/fine_tune/fine_tune_detr.py
project: "Fine-tune DETR KITTI-MOTS"
method: grid
metric:
  name: val_coco_ap
  goal: maximize
parameters:
  # Sweep over the new aggressive augmentation groups
  aug_strategy:
    values: ["base", "legacy", "geometric", "color_jitter", "extreme_weather", "heavy_corruption", "limit_test"]
    
  # Fixed parameters (found from the previous architecture sweep)
  freeze_strategy:
    value: 3         
  lr:
    value: 0.0001   
  name_fields:
    value: "aug_strategy"
  epochs:
    value: 15
  t_max:
    value: 20

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "--config"
  - "src/fine_tune/config_detr.yaml"
  - ${args}