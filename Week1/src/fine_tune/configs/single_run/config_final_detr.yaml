project: "Fine-tune DETR KITTI-MOTS"
experiment_name: "detr_final"
output_dir: "results"

data:
  root: "~/mcv/datasets/C5/KITTI-MOTS/"
  num_workers: 4
  mode: "full"       # Options: search (train on "train", validate on "dev"), full (train on "train_full", validate on "validation")
  split_ratio: 0.8     # For search mode
  seed: 42             # For deterministic splitting

model:
  name: "detr" # Options: faster_rcnn, yolo, detr
  weights: "facebook/detr-resnet-50" 

training:
  epochs: 25
  batch_size: 32        # Note: DETR usually requires smaller batch sizes than Faster R-CNN due to memory
  val_batch_size: 32
  lr: 0.00015
  freeze_strategy: 3   # 1: Freeze backbone. 2: Freeze backbone + encoder. 3: Freeze everything except heads
  optimizer: "adamw"
  gradient_clipping: 0.8
  aug_strategy: "base"
  name_fields: "freeze_strategy,lr,optimizer,aug_strategy,gradient_clipping"
  scheduler: 
    name: "cosine"
    t_max: 25

debug: false
