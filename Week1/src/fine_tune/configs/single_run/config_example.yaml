project: "Fine-tune Faster R-CNN KITTI-MOTS"
experiment_name: "faster_rcnn_baseline"
output_dir: "results"

data:
  root: "~/mcv/datasets/C5/KITTI-MOTS/"
  num_workers: 4
  mode: "search"       # Options: search (train on "train", validate on "dev"), full (train on "train_full", validate on "validation")
  split_ratio: 0.8     # For search mode
  seed: 42             # For deterministic splitting

model:
  name: "faster_rcnn" # Options: faster_rcnn, yolo, detr
  weights: "fasterrcnn_mobilenet_v3_large_fpn" # or yolov8n.pt for YOLO

training:
  epochs: 10
  batch_size: 32
  val_batch_size: 32
  lr: 0.00005 # 0.0001
  freeze_strategy: 1
  aug_strategy: "legacy"
  name_fields: "freeze_strategy,lr"
  nms_iou_threshold: 0.5
  scheduler: 
    name: cosine
    t_max: 10


debug: false
