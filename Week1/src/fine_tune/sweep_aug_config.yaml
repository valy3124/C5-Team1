program: src/fine_tune/fine_tune.py
project: "Fine-tune Faster R-CNN KITTI-MOTS"
method: grid
metric:
  name: val_coco_ap
  goal: maximize
parameters:
  # Sweep over the new aggressive augmentation groups
  aug_strategy:
    values: ["base", "legacy", "geometric", "color_jitter", "extreme_weather", "heavy_corruption", "limit_test"]
    
  # Fixed parameters (found from the previous architecture sweep)
  freeze_strategy:
    value: 2          # Level 2 (ROI Heads + Box Predictor)
  lr:
    value: 0.0001     # 1e-4
  name_fields:
    value: "aug_strategy"
  epochs:
    value: 30
  t_max:
    value: 30

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - "--config"
  - "src/fine_tune/config_example.yaml"
  - ${args}
